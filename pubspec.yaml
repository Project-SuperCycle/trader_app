name: trader_app
description: "Trader mobile application for supercycle."
publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  printing: ^5.13.1
  pdf: ^3.12.0

  cupertino_icons: ^1.0.8
  go_router: ^16.1.0
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  get_it: ^8.2.0
  dartz: ^0.10.1
  equatable: ^2.0.7
  smooth_page_indicator: ^1.2.1
  loading_indicator: ^3.1.1
  flutter_rating_bar: ^4.0.1
  dropdown_button2: ^2.3.9
  email_validator: ^3.0.0
  dio: ^5.8.0+1
  path: ^1.9.0
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  wolt_modal_sheet: ^0.11.0
  permission_handler: ^12.0.1
  logger: ^2.6.1
  mime: ^2.0.0
  http_parser: ^4.1.2
  device_info_plus: ^11.3.0
  carousel_slider: ^5.1.1
  easy_image_viewer: ^1.5.1
  percent_indicator: ^4.2.5
  device_preview: ^1.2.0
  lottie: ^3.3.1
  intl: 0.20.2
  flutter_svg: ^2.2.0
  expandable_page_view: ^1.0.17
  fl_chart: ^0.71.0
  image_picker: ^1.1.2
  flutter_localizations:
    sdk: flutter
  pinput: ^5.0.1
  curved_navigation_bar: ^1.0.6
  font_awesome_flutter: ^10.10.0
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.2
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  animations: ^2.1.1
  intl_phone_field: ^3.2.0
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^20.0.0
  firebase_messaging: ^16.1.1
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: 2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700

    - family: Beiruti
      fonts:
        - asset: assets/fonts/Beiruti/Beiruti-Regular.ttf
          weight: 400
        - asset: assets/fonts/Beiruti/Beiruti-Medium.ttf
          weight: 500
        - asset: assets/fonts/Beiruti/Beiruti-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Beiruti/Beiruti-Bold.ttf
          weight: 700

flutter_intl:
  enabled: true

flutter_launcher_icons:
  android: true
  ios: true

  image_path_android: "assets/icons/trader_launcher.png"
  image_path_ios: "assets/icons/trader_launcher.png"

  adaptive_icon_background: "#194C3B"
  adaptive_icon_foreground: "assets/icons/trader_launcher.png"